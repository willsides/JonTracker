services:
  jontracker:
    container_name: jontracker
    image: ghcr.io/willsides/jontracker:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MAPSHARE_ID_FILE=/run/secrets/mapshare_id
      - EMAIL_ADDRESS_FILE=/run/secrets/email_address
      - EMAIL_APP_PASSWORD_FILE=/run/secrets/email_app_password
      - STADIA_API_KEY_FILE=/run/secrets/stadia_api_key
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - GARMIN_POLL_INTERVAL=300
      - EMAIL_IMAP_SERVER=imap.gmail.com
      - EMAIL_POLL_INTERVAL=60
      - MAX_PHOTOS=200
      - SLIDESHOW_INTERVAL=8
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    secrets:
      - mapshare_id
      - email_address
      - email_app_password
      - stadia_api_key
      - secret_key
    volumes:
      - photos:/app/static/photos
    security_opt:
      - no-new-privileges:true

secrets:
  mapshare_id:
    file: /mnt/DataStore/Apps/secrets/jontracker_mapshare_id
  email_address:
    file: /mnt/DataStore/Apps/secrets/jontracker_email_address
  email_app_password:
    file: /mnt/DataStore/Apps/secrets/jontracker_email_app_password
  stadia_api_key:
    file: /mnt/DataStore/Apps/secrets/jontracker_stadia_api_key
  secret_key:
    file: /mnt/DataStore/Apps/secrets/jontracker_secret_key

volumes:
  photos:
