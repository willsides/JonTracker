services:
  jontracker:
    image: ghcr.io/YOUR_GITHUB_USERNAME/jontracker:latest
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - photos:/app/static/photos
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json  # registry credentials
    command: --interval 300 jontracker          # check every 5 minutes
    restart: unless-stopped

volumes:
  photos:
